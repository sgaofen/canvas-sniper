<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: white;
    }

    /* 标题区 */
    .header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .header .version {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }

    /* 开关组 */
    .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.2s;
    }

    .toggle-container:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .toggle-info {
      flex: 1;
      margin-right: 10px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      display: block;
      margin-bottom: 2px;
    }

    .toggle-desc {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.3;
    }

    /* 开关样式 */
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #4CAF50;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    /* 状态文字 */
    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.3s;
    }

    .status.on {
      color: #4CAF50;
    }

    /* 帮助按钮 */
    .help-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: rgba(100, 181, 246, 0.1);
      border: 1px solid rgba(100, 181, 246, 0.2);
      color: #64B5F6;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .help-btn:hover {
      background: rgba(100, 181, 246, 0.2);
      border-color: rgba(100, 181, 246, 0.4);
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎯 Canvas Sniper</h1>
    <span class="version">v2.1</span>
  </div>

  <div class="toggle-group">
    <div class="toggle-container">
      <div class="toggle-info">
        <span class="toggle-label">启用</span>
        <span class="toggle-desc">双击题目自动作答</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-container">
      <div class="toggle-info">
        <span class="toggle-label">无痕模式</span>
        <span class="toggle-desc">隐藏右下角状态提示</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="stealthToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-container">
      <div class="toggle-info">
        <span class="toggle-label">模拟鼠标</span>
        <span class="toggle-desc">拟人化操作，模拟真人答题</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="cursorToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="status">已关闭</div>
  <button class="help-btn" id="helpBtn">📖 使用说明</button>
  <script src="popup.js"></script>
</body>

</html>
